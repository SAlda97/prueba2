<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Universidad Mariano Galvez</title>
    <style>
        body {
            background-color: #f4f6f8;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            color: #1a237e;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 2.5rem;
            font-weight: 600;
            background-color: #e3e6ea;
            padding: 30px 60px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(30, 41, 59, 0.08);
            letter-spacing: 1px;
            margin-bottom: 32px;
        }
        button {
            background-color: #1a237e;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 1.1rem;
            padding: 12px 32px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(30, 41, 59, 0.06);
            transition: background 0.2s;
        }
        button:hover {
            background-color: #283593;
        }
    </style>
</head>
<body>
    <h1>Universidad Mariano Galvez</h1>
    <button onclick="alert('Buen dia')">Saludo</button>
</body>
</html>
